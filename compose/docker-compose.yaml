services:
  mysql:
    image: docker.1ms.run/mysql:8.3.0
    container_name: db-mp
    restart: always
    env_file:
      - ../.env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d

  redis:
    image: docker.1ms.run/redis:7-alpine
    container_name: we-mp-rss-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  singbox:
    image: ghcr.io/sagernet/sing-box:latest
    container_name: we-mp-rss-singbox
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      SINGBOX_INBOUND_PORT: 7890
      SINGBOX_LOG_LEVEL: info
    entrypoint:
      - /bin/sh
      - /etc/sing-box/run-singbox.sh
    volumes:
      - ./singbox/run-singbox.sh:/etc/sing-box/run-singbox.sh:ro

  we-mp-rss:
    image: ghcr.io/rachelos/we-mp-rss:latest
    container_name: we-mp-rss
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DB: mysql+pymysql://rss_user:pass123456@db-mp/we_mp_rss?charset=utf8mb4
      REDIS_URL: redis://redis:6379/0
      PROXY_HTTP_URL: http://singbox:7890
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
    depends_on:
      - mysql
      - redis
      - singbox

volumes:
  db_data:
  redis_data:
